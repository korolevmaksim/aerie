name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: typecheck · lint · test · build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Stage 0 smoke (verify runnable bundle)
        run: npm run smoke -- --no-build

      - name: Node smoke tests
        run: npm run smoke:gitdiff && npm run smoke:tooling && npm run smoke:worktree

      - name: Electron smoke tests
        if: runner.os == 'Linux'
        run: |
          xvfb-run -a npm run smoke:findings
          xvfb-run -a npm run smoke:migration
          xvfb-run -a npm run smoke:store
          xvfb-run -a npm run smoke:watches
          xvfb-run -a npm run smoke:pipelines

      - name: Packaging smoke (macOS unpacked)
        if: runner.os == 'macOS'
        run: CSC_IDENTITY_AUTO_DISCOVERY=false npm run build:unpack
